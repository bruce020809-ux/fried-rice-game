<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#ffc36f">
<title>卡通炒飯翻鍋</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,"Microsoft JhengHei",sans-serif;background:#ffc36f;user-select:none}
body{overscroll-behavior:none}
#app{position:relative;width:100vw;height:100dvh;min-height:560px;overflow:hidden;background:radial-gradient(circle at 17% 14%,rgba(255,255,255,.55),transparent 23%),radial-gradient(circle at 86% 19%,rgba(255,255,255,.34),transparent 22%),linear-gradient(180deg,#ffe9bd 0%,#ffc36f 52%,#ea8c38 100%)}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.topbar{position:absolute;z-index:28;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:grid;grid-template-columns:1.28fr .82fr 1fr;gap:9px;align-items:stretch;pointer-events:none}
.card{height:96px;background:rgba(255,250,240,.96);border:4px solid #6b3a16;border-radius:22px;color:#3a1d08;box-shadow:0 7px 0 rgba(107,58,22,.24),0 5px 18px rgba(107,58,22,.08);overflow:hidden}
.brand{padding:11px 14px;display:flex;flex-direction:column;justify-content:center;height:96px}
.title{font-size:18px;font-weight:1000;line-height:1.12;letter-spacing:.2px}
.desc{margin-top:5px;font-size:12px;line-height:1.42;font-weight:900}
.map-card{height:96px;padding:9px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;pointer-events:auto}
.map-icon{font-size:20px;line-height:1}
.map-btn{display:inline-flex;align-items:center;justify-content:center;height:36px;width:100%;padding:0 10px;border:3px solid #6b3a16;border-radius:999px;background:linear-gradient(180deg,#fffaf0,#ffe6b5);color:#3a1d08;text-decoration:none;font-size:14px;font-weight:1000;box-shadow:0 5px 0 rgba(107,58,22,.24);white-space:nowrap}
.map-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(107,58,22,.24)}
.map-note{font-size:10px;font-weight:1000;color:#6b3a16;line-height:1}
.score-card{height:96px;padding:9px 11px;display:grid;grid-template-columns:1fr;row-gap:5px;align-content:center}
.score{font-size:25px;line-height:1;font-weight:1000;text-align:left;white-space:nowrap}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.row{display:flex;justify-content:space-between;gap:6px;font-size:11px;font-weight:1000;white-space:nowrap}
.meter{position:absolute;z-index:18;left:50%;bottom:max(68px,calc(env(safe-area-inset-bottom) + 56px));transform:translateX(-50%);width:min(620px,calc(100vw - 32px));pointer-events:none}
.bar-bg{height:26px;border:4px solid #6b3a16;border-radius:999px;background:#fff7de;overflow:hidden;box-shadow:0 6px 0 rgba(107,58,22,.22),inset 0 2px 8px rgba(0,0,0,.12)}
.bar{height:100%;width:84%;border-radius:999px;background:linear-gradient(90deg,#fff176 0%,#ffc234 45%,#ff8a2a 72%,#f4511e 100%);transition:width .08s linear}
.tip{margin-top:9px;text-align:center;font-size:14px;font-weight:1000;color:#3a1d08;text-shadow:0 2px 0 rgba(255,255,255,.65)}
.overlay{position:absolute;inset:0;z-index:40;display:grid;place-items:center;padding:18px;background:rgba(93,47,12,.12);pointer-events:none}
.menu{width:min(430px,88vw);max-height:min(82dvh,760px);overflow-y:auto;-webkit-overflow-scrolling:touch;text-align:center;color:#3a1d08;background:#fffaf0;border:4px solid #6b3a16;border-radius:28px;box-shadow:0 12px 0 rgba(107,58,22,.28);padding:22px 20px 20px;transform:translateY(12px);pointer-events:auto}
.menu h1{margin:0 0 10px;font-size:31px;line-height:1.08}

.result{margin:15px 0 4px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.result div{background:#ffe6aa;border:2px solid rgba(107,58,22,.4);border-radius:17px;padding:9px 8px;font-weight:1000}
.result span{display:block;margin-top:4px;font-size:23px}
.perfect-art{margin:12px auto 4px;width:216px;height:132px;position:relative}
.bowl{position:absolute;left:28px;right:28px;bottom:12px;height:56px;border:5px solid #6b3a16;border-top:0;border-radius:0 0 78px 78px;background:linear-gradient(180deg,#ff835c,#d94b2b)}
.rice-art{position:absolute;left:36px;right:36px;bottom:58px;height:46px;border:5px solid #6b3a16;border-bottom:0;border-radius:86px 86px 0 0;background:radial-gradient(circle at 30% 52%,#7cd957 0 8%,transparent 9%),radial-gradient(circle at 68% 45%,#ff8b2d 0 7%,transparent 8%),radial-gradient(circle at 52% 36%,#ffe16a 0 10%,transparent 11%),#fff4c8}
.sparkle{position:absolute;color:#ffb300;font-size:28px;font-weight:1000;text-shadow:2px 2px 0 #fff}
.s1{left:0;top:12px}.s2{right:0;top:18px}.s3{left:88px;top:0}
button{margin-top:14px;border:0;border-radius:19px;padding:12px 28px;color:white;font-size:20px;font-weight:1000;background:linear-gradient(180deg,#ff9f2d,#ef6d00);box-shadow:0 7px 0 #a94900;cursor:pointer}
button:active{transform:translateY(4px);box-shadow:0 3px 0 #a94900}
.flash{position:absolute;z-index:30;left:50%;top:42%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;color:#b63600;font-size:34px;font-weight:1000;text-shadow:3px 3px 0 #fff,-3px 3px 0 #fff,3px -3px 0 #fff,-3px -3px 0 #fff,0 5px 0 rgba(107,58,22,.18)}
.flash.show{animation:flash .58s ease-out}
.result-fx{position:absolute;inset:0;z-index:39;pointer-events:none;overflow:hidden}
.result-badge{position:absolute;left:50%;top:17%;transform:translateX(-50%);padding:10px 18px;border-radius:999px;border:4px solid #6b3a16;background:rgba(255,250,240,.96);font-size:28px;font-weight:1000;color:#3a1d08;box-shadow:0 10px 0 rgba(107,58,22,.22),0 0 30px rgba(255,255,255,.28);animation:badgePop .9s cubic-bezier(.2,.9,.2,1)}
.result-badge.success{background:linear-gradient(180deg,#fff9ce,#ffd85d);box-shadow:0 10px 0 rgba(107,58,22,.24),0 0 36px rgba(255,214,82,.58)}
.result-badge.gold{background:linear-gradient(180deg,#fff8d5,#ffd657);box-shadow:0 10px 0 rgba(107,58,22,.24),0 0 36px rgba(255,214,82,.58)}
.result-badge.royal{background:linear-gradient(180deg,#fff8ea,#ffd197);box-shadow:0 10px 0 rgba(107,58,22,.24),0 0 40px rgba(255,166,81,.6)}
.result-badge.rainbow{background:linear-gradient(180deg,#fffef6,#ffe0f0);box-shadow:0 10px 0 rgba(107,58,22,.24),0 0 48px rgba(255,120,198,.48)}
.result-badge.legend{background:linear-gradient(180deg,#fffbe8,#ffe660);box-shadow:0 10px 0 rgba(107,58,22,.24),0 0 54px rgba(255,226,95,.72)}
.result-badge.fail{background:linear-gradient(180deg,#fff0ea,#ffb39f);box-shadow:0 10px 0 rgba(107,58,22,.24),0 0 34px rgba(255,110,84,.45)}
.result-tier{position:absolute;left:50%;top:25%;transform:translateX(-50%);font-size:22px;font-weight:1000;color:#fff7de;text-shadow:0 4px 0 rgba(98,37,0,.45),0 0 18px rgba(0,0,0,.15);animation:glowRise 1.2s ease-out}
.confetti,.smoke,.spark,.burst-ring,.ray{position:absolute;pointer-events:none}
.confetti{width:12px;height:18px;border-radius:4px;left:50%;top:18%;background:var(--c);transform:translateX(-50%) rotate(0deg);animation:confettiFall var(--d) ease-in forwards}
.smoke{width:22px;height:22px;border-radius:50%;left:50%;top:26%;background:radial-gradient(circle,#5c463d 0%,#342520 70%,rgba(52,37,32,0) 72%);opacity:.85;animation:smokeRise var(--d) ease-out forwards}
.spark{width:12px;height:12px;left:50%;top:24%;background:radial-gradient(circle,#fff6bb 0%,#ffb21f 55%,rgba(255,178,31,0) 72%);border-radius:50%;animation:sparkBurst var(--d) ease-out forwards}
.burst-ring{left:50%;top:25%;width:34px;height:34px;border:5px solid var(--ring);border-radius:50%;opacity:0;animation:ringBlast var(--d) ease-out forwards}
.ray{left:50%;top:22%;width:10px;height:128px;border-radius:999px;background:linear-gradient(180deg,var(--ray1),var(--ray2),rgba(255,255,255,0));opacity:0;transform-origin:center 160px;animation:rayBurst var(--d) ease-out forwards}
.menu.success-mode{border-color:#8f4a00;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 6px rgba(255,215,92,.34),0 0 42px rgba(255,208,77,.34)}
.menu.gold-mode{border-color:#8f4a00;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 7px rgba(255,221,102,.36),0 0 44px rgba(255,208,77,.36)}
.menu.royal-mode{border-color:#9a5000;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 8px rgba(255,188,108,.34),0 0 48px rgba(255,162,74,.36)}
.menu.rainbow-mode{border-color:#9a5000;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 8px rgba(255,160,222,.28),0 0 52px rgba(111,194,255,.28)}
.menu.legend-mode{border-color:#8f4a00;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 10px rgba(255,235,137,.46),0 0 60px rgba(255,224,108,.52)}
.menu.fail-mode{border-color:#8b2f14;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 6px rgba(255,123,90,.26),0 0 40px rgba(148,50,21,.26);animation:menuShake .7s ease-out}
.menu.master-mode{border-color:#8f4a00;box-shadow:0 12px 0 rgba(107,58,22,.28),0 0 0 8px rgba(255,231,123,.38),0 0 50px rgba(255,214,82,.42)}
.result-hero{margin:4px 0 10px;font-size:18px;font-weight:1000;color:#8b3c00;animation:heroBounce .9s ease-out}

.menu-sub{margin:6px 0 14px;font-size:15px;font-weight:1000;color:#7a3200}
.dish-grid{display:grid;grid-template-columns:1fr;gap:10px;margin:10px 0 12px}
.dish-card{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 14px;border-radius:20px;border:3px solid rgba(107,58,22,.36);background:#fff4d6;cursor:pointer;transition:transform .15s ease,border-color .15s ease,box-shadow .15s ease}
.dish-card.active{border-color:#a45300;background:linear-gradient(180deg,#fff4cf,#ffd98d);box-shadow:0 6px 0 rgba(107,58,22,.15)}
.dish-card:active{transform:translateY(3px)}
.dish-main{text-align:left}
.dish-name{font-size:20px;font-weight:1000;line-height:1.1}
.dish-meta{margin-top:4px;font-size:12px;font-weight:1000;color:#8b4b11}
.dish-note{margin-top:4px;font-size:11px;font-weight:900;color:#6b3a16}
.dish-badge{min-width:70px;padding:10px 10px;border-radius:16px;border:2px solid #6b3a16;background:#fffaf0;font-size:16px;font-weight:1000;color:#6b3a16}
.selected-panel{margin:12px 0 2px;padding:12px 14px;border-radius:20px;border:3px solid rgba(107,58,22,.3);background:linear-gradient(180deg,#fffaf0,#ffe9be)}
.selected-title{font-size:18px;font-weight:1000}
.selected-text{margin-top:5px;font-size:12px;line-height:1.5;font-weight:900;color:#6b3a16}
.best-line{margin-top:7px;font-size:12px;font-weight:1000;color:#a45300}
.recipe-pill{display:inline-flex;align-items:center;justify-content:center;margin:2px auto 8px;padding:7px 12px;border-radius:999px;background:#ffe09d;border:2px solid rgba(107,58,22,.35);font-size:12px;font-weight:1000;color:#7a3200}
.action-row{display:flex;gap:10px;justify-content:center;align-items:center;flex-wrap:wrap}
.secondary-btn{background:linear-gradient(180deg,#ffe7b3,#ffb95c);box-shadow:0 7px 0 #b7771f;color:#6b3a16}
.secondary-btn:active{box-shadow:0 3px 0 #b7771f}
.score-hero{margin:12px auto 8px;width:min(300px,86%);padding:10px 14px;border-radius:22px;border:3px solid #6b3a16;background:linear-gradient(180deg,#fff7d7,#ffd071);font-size:22px;font-weight:1000;color:#7a3200;box-shadow:0 6px 0 rgba(107,58,22,.2);white-space:nowrap;line-height:1.15;overflow:hidden;text-overflow:ellipsis}
.fail-stamp{margin:12px auto 8px;width:min(230px,74%);padding:12px 14px;border-radius:22px;border:3px solid #8b2f14;background:linear-gradient(180deg,#ffe4db,#ffb6a1);font-size:24px;font-weight:1000;color:#8b2f14;box-shadow:0 6px 0 rgba(139,47,20,.2);transform:rotate(-4deg);animation:stampDown .65s cubic-bezier(.2,.85,.25,1)}
@keyframes flash{0%{opacity:0;transform:translate(-50%,-20%) scale(.82) rotate(-6deg)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}100%{opacity:0;transform:translate(-50%,-88%) scale(1) rotate(0)}}
@keyframes badgePop{0%{opacity:0;transform:translateX(-50%) scale(.55) translateY(-18px)}55%{opacity:1;transform:translateX(-50%) scale(1.12) translateY(0)}100%{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes glowRise{0%{opacity:0;transform:translateX(-50%) translateY(8px) scale(.9)}100%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}}
@keyframes confettiFall{0%{opacity:0;transform:translateX(-50%) translate(0,0) rotate(0deg) scale(.7)}8%{opacity:1}100%{opacity:1;transform:translateX(-50%) translate(var(--x),var(--y)) rotate(var(--r)) scale(1)}}
@keyframes smokeRise{0%{opacity:.05;transform:translateX(-50%) translate(0,0) scale(.4)}20%{opacity:.86}100%{opacity:0;transform:translateX(-50%) translate(var(--x),var(--y)) scale(2.1)}}
@keyframes sparkBurst{0%{opacity:0;transform:translateX(-50%) translate(0,0) scale(.5)}12%{opacity:1}100%{opacity:0;transform:translateX(-50%) translate(var(--x),var(--y)) scale(1.5)}}
@keyframes ringBlast{0%{opacity:0;transform:translateX(-50%) scale(.25)}18%{opacity:.95}100%{opacity:0;transform:translateX(-50%) scale(var(--s))}}
@keyframes rayBurst{0%{opacity:0;transform:translateX(-50%) rotate(var(--rot)) scaleY(.2)}18%{opacity:.95}100%{opacity:0;transform:translateX(-50%) rotate(var(--rot)) scaleY(1.15)}}
@keyframes menuShake{0%,100%{transform:translateY(12px) translateX(0)}18%{transform:translateY(12px) translateX(-10px)}36%{transform:translateY(12px) translateX(10px)}54%{transform:translateY(12px) translateX(-7px)}72%{transform:translateY(12px) translateX(7px)}}
@keyframes heroBounce{0%{opacity:0;transform:scale(.7) translateY(12px)}60%{opacity:1;transform:scale(1.06) translateY(-4px)}100%{opacity:1;transform:scale(1) translateY(0)}}
@keyframes stampDown{0%{opacity:0;transform:rotate(-12deg) scale(1.5)}55%{opacity:1;transform:rotate(-3deg) scale(.92)}100%{opacity:1;transform:rotate(-4deg) scale(1)}}
@media(max-width:600px){
.menu{max-height:min(80dvh,700px)}
.menu-sub{font-size:14px}
.dish-grid{gap:8px;margin:8px 0 10px}
.dish-card{padding:10px 11px;border-radius:18px}
.dish-name{font-size:18px}
.dish-meta{font-size:11px}
.dish-note{font-size:10px}
.dish-badge{min-width:62px;font-size:14px;padding:8px 8px}
.selected-title{font-size:16px}
.selected-text{font-size:11px}
.recipe-pill{font-size:11px;padding:6px 10px}
.action-row{gap:8px}
.secondary-btn{font-size:18px}

#app{min-height:620px}
.topbar{top:max(10px,env(safe-area-inset-top));left:9px;right:9px;gap:6px;grid-template-columns:1.22fr .84fr 1fr;align-items:stretch}
.card{height:86px;border-width:3px;border-radius:18px}
.brand{height:86px;padding:8px 9px}
.map-card{height:86px;padding:6px 7px;gap:4px}

.title{font-size:14px}
.desc{font-size:10px}
.map-icon{font-size:17px}
.map-btn{height:31px;font-size:10.5px;padding:0 4px;border-width:2px}
.map-note{font-size:8.5px}
.score{font-size:19px}
.stat-grid{gap:3px 5px}
.row{font-size:9.6px}

}
@media(max-width:390px){

</style>

<body>
<div id="app">
<canvas id="game"></canvas>
<div class="topbar">
<div class="card brand"><div class="title" id="brandTitle">卡通炒飯翻鍋</div><div class="desc" id="brandDesc">穩穩翻鍋別燒焦<br>太急才會掉飯</div></div>
<div class="card map-card">
<div class="map-icon">📍</div>
<a class="map-btn" id="mapBtn" href="https://maps.app.goo.gl/LaSTTYi846HwvyE2A?g_st=ic" target="_blank" rel="noopener">推薦店家</a>
<div class="map-note">點我查看</div>
</div>
<div class="card score-card">
<div class="score"><span id="score">0</span> 分</div>
<div class="stat-grid">
<div class="row"><span>掉飯</span><span id="lost">0</span></div>
<div class="row"><span>燒焦</span><span><span id="burn">0</span>%</span></div>
<div class="row"><span>時間</span><span><span id="time">30</span>s</span></div>
<div class="row"><span>最佳</span><span id="best">0</span></div>
</div>
</div>
</div>
<div class="flash" id="flash">漂亮翻鍋！</div>
<div class="result-fx" id="resultFx"></div>
<div class="meter"><div class="bar-bg"><div class="bar" id="bar"></div></div><div class="tip" id="tip">穩穩翻不太掉飯，太久沒翻會燒焦</div></div>
<div class="overlay" id="overlay"><div class="menu" id="menu"></div></div>
</div>
<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
const scoreEl=document.getElementById("score")
const lostEl=document.getElementById("lost")
const timeEl=document.getElementById("time")
const bestEl=document.getElementById("best")
const burnEl=document.getElementById("burn")
const barEl=document.getElementById("bar")
const tipEl=document.getElementById("tip")
const overlay=document.getElementById("overlay")
const menu=document.getElementById("menu")
const titleEl=document.getElementById("brandTitle")
const descEl=document.getElementById("brandDesc")
const flash=document.getElementById("flash")
const resultFx=document.getElementById("resultFx")

let w=0,h=0,dpr=1,scale=1,panX=0,panY=0
let running=false,score=0,lost=0,timeLeft=30,best=0,burn=0
let food=[],spills=[],stars=[],steam=[]
let timer=null,raf=0,lastTime=0,lastTap=0,stability=84,combo=0,cooldown=0,idleTime=0
let flip={active:false,t:1,duration:.86,lift:0,angle:0,forward:0,shake:0,quality:"normal"}
bestEl.textContent=best
mapBtn.addEventListener("pointerdown",e=>e.stopPropagation())
mapBtn.addEventListener("click",e=>e.stopPropagation())

const recipes={
egg:{key:"egg",name:"蛋炒飯",title:"蛋炒飯翻鍋",difficulty:"簡單",label:"容易",cardLine1:"最不容易掉出去",cardLine2:"節奏最寬鬆",menuNote:"只要穩穩翻鍋就很好上手",tip:"蛋炒飯最穩，穩穩翻不太掉飯",mix:[["rice",0.74],["egg",0.18],["scallion",0.08]],spillBoost:.72,burnRate:.9,drain:.85,minGap:165,perfectMin:300,perfectMax:930,badPenalty:6,goodGain:4,perfectGain:8,goodScore:13,perfectScore:24,foodScale:1.02},
mixed:{key:"mixed",name:"什錦炒飯",title:"什錦炒飯翻鍋",difficulty:"普通",label:"普通",cardLine1:"配料均衡剛剛好",cardLine2:"需要正常節奏",menuNote:"手感與風險最平衡的挑戰",tip:"什錦炒飯最均衡，節奏正常就好",mix:[["rice",0.59],["egg",0.12],["carrot",0.12],["pea",0.10],["scallion",0.07]],spillBoost:1,burnRate:1,drain:1,minGap:190,perfectMin:330,perfectMax:860,badPenalty:8,goodGain:3,perfectGain:7,goodScore:12,perfectScore:22,foodScale:1},

function tapGame(cx,cy){
if(!running)return
let r=canvas.getBoundingClientRect(),x=cx-r.left,y=cy-r.top,l=worldToPan(x,y)
if(!(Math.abs(l.x)<160&&l.y>-90&&l.y<95))return
let now=performance.now(),gap=lastTap?now-lastTap:999
lastTap=now
idleTime=0
burn=clamp(burn-4,0,100)
let busy=flip.active&&flip.t<.72
let tooFast=busy||cooldown>.06||gap<currentRecipe.minGap
let quality="normal"
if(tooFast){
quality="bad"
combo=0
stability=clamp(stability-currentRecipe.badPenalty,0,100)
score+=4
tipEl.textContent="太急了，可能會噴出幾粒飯"
showFlash("慢一點！")
}else if(gap>=currentRecipe.perfectMin&&gap<=currentRecipe.perfectMax||flip.t>.86&&gap>currentRecipe.minGap+25){
quality="perfect"
combo++
stability=clamp(stability+currentRecipe.perfectGain,0,100)
score+=currentRecipe.perfectScore+Math.min(combo*3,24)
tipEl.textContent="時機漂亮，整團飯會回鍋"
if(combo%3===0)showFlash("漂亮翻鍋！")
}else{
quality="good"
combo=Math.max(1,combo)
stability=clamp(stability+currentRecipe.goodGain,0,100)
score+=currentRecipe.goodScore
tipEl.textContent="不錯，穩穩翻比較安全"
}
startFlip(quality)
maybeSpill(quality)
addStars(quality)
cooldown=.42
updateUI()
}
function startFlip(q){flip.active=true;flip.t=0;flip.quality=q;flip.duration=q==="bad"?.74:q==="perfect"?.9:.86}
function maybeSpill(q){
let base=q==="bad"?.22:q==="perfect"?.004:.03
base*=currentRecipe.spillBoost
base+=(100-stability)/560
if(Math.random()>base)return
let amount=q==="bad"?Math.floor(rand(currentRecipe.key==="beef"?2:1,currentRecipe.key==="egg"?2.2:3)):1
for(let i=0;i<amount;i++)throwOne()
}
function throwOne(){
if(food.length<=18)return
let edge=food.map((p,i)=>({i,d:Math.abs(p.lx)})).sort((a,b)=>b.d-a.d).slice(0,Math.min(20,food.length))
let pick=edge[Math.floor(Math.random()*edge.length)].i
let p=food[pick],pos=foodWorld(p)
let dir=Math.sign(p.lx||rand(-1,1))
spills.push({type:p.type,x:pos.x,y:pos.y,vx:dir*rand(150,240)*scale,vy:-rand(250,410)*scale,rot:p.rot,spin:rand(-7,7),size:p.size,face:p.face,burn:burn})
food.splice(pick,1)
lost++
}
function addStars(q){
let n=q==="bad"?3:q==="perfect"?9:6
for(let i=0;i<n;i++)stars.push({x:panX+rand(-70,70)*scale,y:panY-rand(28,70)*scale,vx:rand(-85,85),vy:rand(-150,-60),life:rand(.36,.62),max:.62,r:rand(3,6),rot:rand(0,Math.PI*2),spin:rand(-8,8),kind:Math.random()<.5?"star":"dot"})
}
function loop(t){if(!running)return;let dt=Math.min(.026,(t-lastTime)/1000);lastTime=t;update(dt);draw();raf=requestAnimationFrame(loop)}
function update(dt){
layout()
if(!currentRecipe)return
cooldown=Math.max(0,cooldown-dt)
idleTime+=dt
if(idleTime>2.4){
burn=clamp(burn+(idleTime>5?18:9)*dt*currentRecipe.burnRate,0,100)
stability=clamp(stability-dt*1.1*currentRecipe.drain,0,100)
tipEl.textContent=burn>=100?"炒飯全黑了，挑戰失敗":"炒飯快燒焦了，快翻鍋！"
}else{
stability=clamp(stability-dt*.45*currentRecipe.drain,0,100)
}
if(burn>=100){
burn=100
updateUI()
endGame("burned")
return
}
if(flip.active){
flip.t+=dt/flip.duration
if(flip.t>=1){flip.t=1;flip.active=false;settleFood()}
}
let e=flip.t<1?ease(flip.t):1,wave=Math.sin(Math.PI*e)
flip.lift=wave*86*scale
flip.angle=-wave*.23+Math.sin(Math.PI*2*e)*.045
flip.forward=wave*8*scale
flip.shake=flip.quality==="bad"&&flip.active?Math.sin(e*Math.PI*8)*6*scale:0
for(let i=0;i<steam.length;i++){
steam[i].life+=dt*steam[i].speed
if(steam[i].life>1)steam[i]=makeSteam()
}
for(let i=spills.length-1;i>=0;i--){
let s=spills[i]
s.vy+=1120*dt
s.x+=s.vx*dt
s.y+=s.vy*dt
s.rot+=s.spin*dt
if(s.y>h-126){
s.y=h-126
s.vx=0
s.vy=0
s.spin=0
}
}
for(let i=stars.length-1;i>=0;i--){
let s=stars[i]
s.life-=dt
s.x+=s.vx*dt
s.y+=s.vy*dt
s.vy+=260*dt
s.rot=(s.rot||0)+(s.spin||0)*dt
if(s.life<=0)stars.splice(i,1)
}
updateUI()
}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function settleFood(){for(let p of food){let r=randomFoodLocal();p.lx=r.x*.72+p.lx*.28;p.ly=r.y;p.rot+=rand(-.6,.6)}}
function panToWorld(lx,ly){let c=Math.cos(flip.angle),s=Math.sin(flip.angle);return{x:panX+flip.forward+flip.shake+(lx*c-ly*s)*scale,y:panY-flip.lift+(lx*s+ly*c)*scale}}
function worldToPan(x,y){let dx=(x-(panX+flip.forward+flip.shake))/scale,dy=(y-(panY-flip.lift))/scale,c=Math.cos(-flip.angle),s=Math.sin(-flip.angle);return{x:dx*c-dy*s,y:dx*s+dy*c}}
function foodWorld(p){let t=flip.t,e=t<1?ease(t):1,arc=-Math.sin(Math.PI*e)*34,spread=1+Math.sin(Math.PI*e)*.22,swirl=Math.sin(e*Math.PI*2+p.bounce)*6;return panToWorld(p.lx*spread+swirl,p.ly+arc/scale-Math.sin(Math.PI*e)*16)}
function draw(){ctx.clearRect(0,0,w,h);drawBackground();drawStove();drawFlame();drawSteam();drawPanBack();drawFood();drawPanFront();drawStars();drawSpills()}

}

ctx.fillRect(0,tableY,w,8)

for(let x=-40;x<w+80;x+=82){
ctx.beginPath()

ctx.fill()
}
ctx.globalAlpha=1
}
function drawCloud(x,y,s){

function drawFlame(){
let pulse=1+Math.sin(performance.now()*.016)*.08
ctx.save()
ctx.translate(panX,panY+42*scale)
ctx.scale(scale*pulse,scale*pulse)
for(let i=0;i<8;i++){
let fx=-48+i*14,h1=34+Math.sin(performance.now()*.008+i)*8
flame(fx,0,12,h1,"#f4511e")
flame(fx,6,8,h1*.65,"#ff9800")
flame(fx,11,5,h1*.38,"#fff176")
}
ctx.restore()
}
function flame(x,y,fw,fh,c){
ctx.beginPath()
ctx.moveTo(x,y-fh)
ctx.bezierCurveTo(x+fw,y-fh*.55,x+fw*.65,y-fh*.08,x,y)
ctx.bezierCurveTo(x-fw*.65,y-fh*.08,x-fw,y-fh*.55,x,y-fh)
ctx.fillStyle=c
ctx.fill()
}
function drawSteam(){
ctx.save()
ctx.lineCap="round"
ctx.lineWidth=4
for(let s of steam){
let p=panToWorld(s.x,-30-s.life*74+s.y)
ctx.globalAlpha=(1-s.life)*.28
ctx.strokeStyle=burn>65?"rgba(80,70,60,.55)":"#fff9df"
ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.bezierCurveTo(p.x-12*s.bend,p.y-12,p.x+16*s.bend,p.y-28,p.x,p.y-46)
ctx.stroke()
}
ctx.globalAlpha=1
ctx.restore()
}
function drawPanBack(){
ctx.save()
ctx.translate(panX+flip.forward+flip.shake,panY-flip.lift)
ctx.rotate(flip.angle)
ctx.scale(scale,scale)
ctx.fillStyle="rgba(0,0,0,.2)"
ctx.beginPath()
ctx.ellipse(0,34,132,18,0,0,Math.PI*2)
ctx.fill()
ctx.save()
ctx.rotate(-.08)
let hdl=ctx.createLinearGradient(80,-10,222,10)
hdl.addColorStop(0,"#54606f")
hdl.addColorStop(1,"#171b22")
ctx.fillStyle=hdl
roundRect(78,-8,154,30,15)
ctx.fill()
ctx.lineWidth=6
ctx.strokeStyle="#111"
roundRect(78,-8,154,30,15)
ctx.stroke()
ctx.restore()
let outer=ctx.createRadialGradient(-22,-18,12,0,0,138)
outer.addColorStop(0,"#6f7c88")
outer.addColorStop(.52,"#303741")
outer.addColorStop(1,"#10131a")
ctx.fillStyle=outer
ctx.beginPath()
ctx.ellipse(0,0,130,62,0,0,Math.PI*2)
ctx.fill()
ctx.lineWidth=7
ctx.strokeStyle="#111"
ctx.stroke()
let inner=ctx.createRadialGradient(-25,-18,10,0,0,105)
inner.addColorStop(0,"#5d626a")
inner.addColorStop(.48,"#393d43")
inner.addColorStop(1,"#1c1f25")
ctx.fillStyle=inner
ctx.beginPath()
ctx.ellipse(0,-5,99,36,0,0,Math.PI*2)
ctx.fill()
ctx.restore()
}
function drawPanFront(){
ctx.save()
ctx.translate(panX+flip.forward+flip.shake,panY-flip.lift)
ctx.rotate(flip.angle)
ctx.scale(scale,scale)
ctx.beginPath()
ctx.ellipse(0,0,130,62,0,.1*Math.PI,.9*Math.PI)
ctx.lineWidth=8
ctx.strokeStyle="#0c0f15"
ctx.stroke()
ctx.restore()
}
function drawFood(){
let list=food.map(p=>({p:p,pos:foodWorld(p)})).sort((a,b)=>a.pos.y-b.pos.y)
for(let item of list){
drawIngredient(item.pos.x,item.pos.y,item.p.type,item.p.rot+flip.t*item.p.spin,item.p.size,item.p.face,burn)
}
}
function drawIngredient(x,y,type,rot,size,face,bn){
ctx.save()
ctx.translate(x,y)
ctx.rotate(rot)
let char=clamp((bn||0)/100,0,1)
let dark=char>.55
if(type==="rice"){
ctx.fillStyle=dark?mix("#fff4c8","#111111",char):mix("#fff4c8","#8a5a28",char*.45)
ctx.strokeStyle=dark?"#000":"#9b6b26"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.ellipse(0,0,7.4*size,4.6*size,0,0,Math.PI*2)
ctx.fill()
ctx.stroke()
if(face&&!dark){
ctx.fillStyle="#4a2b10"
ctx.beginPath()
ctx.arc(-2.4*size,-.8*size,.8*size,0,Math.PI*2)
ctx.arc(2.4*size,-.8*size,.8*size,0,Math.PI*2)
ctx.fill()
}
}else if(type==="egg"){
ctx.fillStyle=dark?mix("#ffe16a","#2b200d",char*.9):mix("#ffe16a","#b77c18",char*.45)
ctx.strokeStyle=dark?"#000":"#9b6b26"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.moveTo(-6*size,-4*size)
ctx.quadraticCurveTo(3*size,-7*size,8*size,-1*size)
ctx.quadraticCurveTo(6*size,7*size,-4*size,5*size)
ctx.quadraticCurveTo(-9*size,2*size,-6*size,-4*size)
ctx.fill()
ctx.stroke()
}else if(type==="carrot"){
ctx.fillStyle=dark?mix("#ff8b2d","#28150a",char*.9):mix("#ff8b2d","#9c5016",char*.45)
ctx.strokeStyle=dark?"#000":"#9b4d12"
ctx.lineWidth=1.8
roundRect(-5.5*size,-5*size,11*size,10*size,3*size)
ctx.fill()
ctx.stroke()
}else if(type==="pea"){
ctx.fillStyle=dark?mix("#79c94b","#15200d",char*.95):mix("#79c94b","#447728",char*.45)
ctx.strokeStyle=dark?"#000":"#3f7d24"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.arc(0,0,5*size,0,Math.PI*2)
ctx.fill()
ctx.stroke()
}else if(type==="beef"){
ctx.fillStyle=dark?mix("#9b5b38","#17110d",char*.92):mix("#9b5b38","#6e391d",char*.38)
ctx.strokeStyle=dark?"#000":"#6a381d"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.moveTo(-7*size,-3*size)
ctx.quadraticCurveTo(-1*size,-8*size,7*size,-3*size)
ctx.quadraticCurveTo(10*size,2*size,5*size,6*size)
ctx.quadraticCurveTo(-1*size,8*size,-8*size,3*size)
ctx.quadraticCurveTo(-10*size,-1*size,-7*size,-3*size)
ctx.fill()
ctx.stroke()
ctx.strokeStyle=dark?mix("#d7ba9e","#222222",char*.65):"rgba(255,236,214,.65)"
ctx.lineWidth=1
ctx.beginPath()
ctx.moveTo(-4*size,-1*size)
ctx.lineTo(4*size,2*size)
ctx.stroke()
}else{
ctx.strokeStyle=dark?mix("#3ca947","#111",char*.9):mix("#3ca947","#2f6b33",char*.4)
ctx.lineWidth=3.2*size
ctx.lineCap="round"
ctx.beginPath()
ctx.moveTo(-6*size,-2*size)
ctx.lineTo(6*size,2*size)
ctx.stroke()
}
ctx.restore()
}
function mix(a,b,t){
let A=parseInt(a.slice(1),16),B=parseInt(b.slice(1),16)
let ar=A>>16&255,ag=A>>8&255,ab=A&255,br=B>>16&255,bg=B>>8&255,bb=B&255
let r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t)
return`rgb(${r},${g},${bl})`
}
function drawStars(){
ctx.save()
for(let s of stars){
ctx.globalAlpha=Math.max(0,s.life/s.max)
ctx.save()
ctx.translate(s.x,s.y)
ctx.rotate(s.rot||0)
if(s.kind==="star"){
ctx.fillStyle="#fff176"
ctx.strokeStyle="#a65a12"
ctx.lineWidth=1.5
star(0,0,s.r*1.8,s.r*.8)
ctx.fill()
ctx.stroke()
}else{
ctx.fillStyle="#fff4be"
ctx.beginPath()
ctx.arc(0,0,s.r,0,Math.PI*2)
ctx.fill()
}
ctx.restore()
}
ctx.globalAlpha=1
ctx.restore()
}
function star(x,y,r1,r2){
ctx.beginPath()
for(let i=0;i<10;i++){
let a=-Math.PI/2+i*Math.PI/5,r=i%2===0?r1:r2,px=x+Math.cos(a)*r,py=y+Math.sin(a)*r
if(i===0)ctx.moveTo(px,py)
else ctx.lineTo(px,py)
}
ctx.closePath()
}
function drawSpills(){
for(let s of spills){
drawIngredient(s.x,s.y,s.type,s.rot,s.size,s.face,s.burn||burn)
}
}
function roundRect(x,y,ww,hh,rr){
ctx.beginPath()
ctx.moveTo(x+rr,y)
ctx.arcTo(x+ww,y,x+ww,y+hh,rr)
ctx.arcTo(x+ww,y+hh,x,y+hh,rr)
ctx.arcTo(x,y+hh,x,y,rr)
ctx.arcTo(x,y,x+ww,y,rr)
ctx.closePath()
}
canvas.addEventListener("pointerdown",e=>{e.preventDefault();tapGame(e.clientX,e.clientY)})
window.addEventListener("resize",resize)
updateRecipeCard()
renderStartMenu()
resize()
draw()
</script>
