<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="theme-color" content="#ffc36f">
<title>卡通炒飯翻鍋</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,"Microsoft JhengHei",sans-serif;background:#ffc36f;user-select:none}
body{overscroll-behavior:none}
#app{position:relative;width:100vw;height:100dvh;min-height:560px;overflow:hidden;background:radial-gradient(circle at 17% 14%,rgba(255,255,255,.55),transparent 23%),radial-gradient(circle at 86% 19%,rgba(255,255,255,.34),transparent 22%),linear-gradient(180deg,#ffe9bd 0%,#ffc36f 52%,#ea8c38 100%)}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.topbar{position:absolute;z-index:28;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:grid;grid-template-columns:1.28fr .82fr 1fr;gap:9px;align-items:stretch;pointer-events:none}
.card{height:96px;background:rgba(255,250,240,.96);border:4px solid #6b3a16;border-radius:22px;color:#3a1d08;box-shadow:0 7px 0 rgba(107,58,22,.24),0 5px 18px rgba(107,58,22,.08);overflow:hidden}
.brand{padding:11px 14px;display:flex;flex-direction:column;justify-content:center;height:96px}
.title{font-size:18px;font-weight:1000;line-height:1.12;letter-spacing:.2px}
.desc{margin-top:5px;font-size:12px;line-height:1.42;font-weight:900}
.map-card{height:96px;padding:9px 10px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;pointer-events:auto}
.map-icon{font-size:20px;line-height:1}
.map-btn{display:inline-flex;align-items:center;justify-content:center;height:36px;width:100%;padding:0 10px;border:3px solid #6b3a16;border-radius:999px;background:linear-gradient(180deg,#fffaf0,#ffe6b5);color:#3a1d08;text-decoration:none;font-size:14px;font-weight:1000;box-shadow:0 5px 0 rgba(107,58,22,.24);white-space:nowrap}
.map-btn:active{transform:translateY(3px);box-shadow:0 2px 0 rgba(107,58,22,.24)}
.map-note{font-size:10px;font-weight:1000;color:#6b3a16;line-height:1}
.score-card{height:96px;padding:9px 11px;display:grid;grid-template-columns:1fr;row-gap:5px;align-content:center}
.score{font-size:25px;line-height:1;font-weight:1000;text-align:left;white-space:nowrap}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
.row{display:flex;justify-content:space-between;gap:6px;font-size:11px;font-weight:1000;white-space:nowrap}
.meter{position:absolute;z-index:18;left:50%;bottom:max(68px,calc(env(safe-area-inset-bottom) + 56px));transform:translateX(-50%);width:min(620px,calc(100vw - 32px));pointer-events:none}
.bar-bg{height:26px;border:4px solid #6b3a16;border-radius:999px;background:#fff7de;overflow:hidden;box-shadow:0 6px 0 rgba(107,58,22,.22),inset 0 2px 8px rgba(0,0,0,.12)}
.bar{height:100%;width:84%;border-radius:999px;background:linear-gradient(90deg,#fff176 0%,#ffc234 45%,#ff8a2a 72%,#f4511e 100%);transition:width .08s linear}
.tip{margin-top:9px;text-align:center;font-size:14px;font-weight:1000;color:#3a1d08;text-shadow:0 2px 0 rgba(255,255,255,.65)}
.overlay{position:absolute;inset:0;z-index:40;display:grid;place-items:center;padding:18px;background:rgba(93,47,12,.12)}
.menu{width:min(430px,88vw);text-align:center;color:#3a1d08;background:#fffaf0;border:4px solid #6b3a16;border-radius:28px;box-shadow:0 12px 0 rgba(107,58,22,.28);padding:22px 20px 20px;transform:translateY(12px)}
.menu h1{margin:0 0 10px;font-size:31px;line-height:1.08}
.menu p{margin:7px 0;font-size:14px;line-height:1.52;font-weight:900}
.result{margin:15px 0 4px;display:grid;grid-template-columns:1fr 1fr;gap:9px}
.result div{background:#ffe6aa;border:2px solid rgba(107,58,22,.4);border-radius:17px;padding:9px 8px;font-weight:1000}
.result span{display:block;margin-top:4px;font-size:23px}
.perfect-art{margin:12px auto 4px;width:216px;height:132px;position:relative}
.bowl{position:absolute;left:28px;right:28px;bottom:12px;height:56px;border:5px solid #6b3a16;border-top:0;border-radius:0 0 78px 78px;background:linear-gradient(180deg,#ff835c,#d94b2b)}
.rice-art{position:absolute;left:36px;right:36px;bottom:58px;height:46px;border:5px solid #6b3a16;border-bottom:0;border-radius:86px 86px 0 0;background:radial-gradient(circle at 30% 52%,#7cd957 0 8%,transparent 9%),radial-gradient(circle at 68% 45%,#ff8b2d 0 7%,transparent 8%),radial-gradient(circle at 52% 36%,#ffe16a 0 10%,transparent 11%),#fff4c8}
.sparkle{position:absolute;color:#ffb300;font-size:28px;font-weight:1000;text-shadow:2px 2px 0 #fff}
.s1{left:0;top:12px}.s2{right:0;top:18px}.s3{left:88px;top:0}
button{margin-top:14px;border:0;border-radius:19px;padding:12px 28px;color:white;font-size:20px;font-weight:1000;background:linear-gradient(180deg,#ff9f2d,#ef6d00);box-shadow:0 7px 0 #a94900;cursor:pointer}
button:active{transform:translateY(4px);box-shadow:0 3px 0 #a94900}
.flash{position:absolute;z-index:30;left:50%;top:42%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;color:#b63600;font-size:34px;font-weight:1000;text-shadow:3px 3px 0 #fff,-3px 3px 0 #fff,3px -3px 0 #fff,-3px -3px 0 #fff,0 5px 0 rgba(107,58,22,.18)}
.flash.show{animation:flash .58s ease-out}
@keyframes flash{0%{opacity:0;transform:translate(-50%,-20%) scale(.82) rotate(-6deg)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}100%{opacity:0;transform:translate(-50%,-88%) scale(1) rotate(0)}}
@media(max-width:600px){
#app{min-height:620px}
.topbar{top:max(10px,env(safe-area-inset-top));left:9px;right:9px;gap:6px;grid-template-columns:1.22fr .84fr 1fr;align-items:stretch}
.card{height:86px;border-width:3px;border-radius:18px}
.brand{height:86px;padding:8px 9px}
.map-card{height:86px;padding:6px 7px;gap:4px}
.score-card{height:86px;padding:7px 8px;row-gap:4px}
.title{font-size:14px}
.desc{font-size:10px}
.map-icon{font-size:17px}
.map-btn{height:31px;font-size:10.5px;padding:0 4px;border-width:2px}
.map-note{font-size:8.5px}
.score{font-size:19px}
.stat-grid{gap:3px 5px}
.row{font-size:9.6px}
.meter{bottom:max(64px,calc(env(safe-area-inset-bottom) + 58px));width:min(620px,calc(100vw - 26px))}
.tip{font-size:13px;padding:0 8px}
.menu{width:min(410px,88vw);padding:20px 17px 18px}
.menu h1{font-size:28px}
.menu p{font-size:13px}
.flash{font-size:28px}
}
@media(max-width:390px){
.topbar{grid-template-columns:1.2fr .82fr 1fr;gap:5px}
.card,.brand,.map-card,.score-card{height:84px}
.title{font-size:13px}
.desc{font-size:9px}
.map-icon{font-size:16px}
.map-btn{height:30px;font-size:9.5px}
.map-note{font-size:8px}
.score{font-size:18px}
.row{font-size:9.2px}
}
</style>
</head>
<body>
<div id="app">
<canvas id="game"></canvas>
<div class="topbar">
<div class="card brand"><div class="title">卡通炒飯翻鍋</div><div class="desc">穩穩翻鍋別燒焦<br>太急才會掉飯</div></div>
<div class="card map-card">
<div class="map-icon">📍</div>
<a class="map-btn" id="mapBtn" href="https://maps.app.goo.gl/LaSTTYi846HwvyE2A?g_st=ic" target="_blank" rel="noopener">推薦店家</a>
<div class="map-note">點我查看</div>
</div>
<div class="card score-card">
<div class="score"><span id="score">0</span> 分</div>
<div class="stat-grid">
<div class="row"><span>掉飯</span><span id="lost">0</span></div>
<div class="row"><span>燒焦</span><span><span id="burn">0</span>%</span></div>
<div class="row"><span>時間</span><span><span id="time">30</span>s</span></div>
<div class="row"><span>最佳</span><span id="best">0</span></div>
</div>
</div>
</div>
<div class="flash" id="flash">漂亮翻鍋！</div>
<div class="meter"><div class="bar-bg"><div class="bar" id="bar"></div></div><div class="tip" id="tip">穩穩翻不太掉飯，太久沒翻會燒焦</div></div>
<div class="overlay" id="overlay"><div class="menu" id="menu"><h1>卡通炒飯翻鍋</h1><p>點鍋子讓炒飯整團翻起來，再自然落回鍋裡。</p><p>太久沒翻，飯會慢慢變黑燒焦。</p><p>超過 800 分會出現完美炒飯圖案。</p><button id="startBtn">開始遊戲</button></div></div>
</div>
<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
const scoreEl=document.getElementById("score")
const lostEl=document.getElementById("lost")
const timeEl=document.getElementById("time")
const bestEl=document.getElementById("best")
const burnEl=document.getElementById("burn")
const barEl=document.getElementById("bar")
const tipEl=document.getElementById("tip")
const overlay=document.getElementById("overlay")
const menu=document.getElementById("menu")
const startBtn=document.getElementById("startBtn")
const flash=document.getElementById("flash")
const mapBtn=document.getElementById("mapBtn")
let w=0,h=0,dpr=1,scale=1,panX=0,panY=0
let running=false,score=0,lost=0,timeLeft=30,best=Number(localStorage.getItem("cartoonFriedRiceBest7")||0),burn=0
let food=[],spills=[],stars=[],steam=[]
let timer=null,raf=0,lastTime=0,lastTap=0,stability=84,combo=0,cooldown=0,idleTime=0
let flip={active:false,t:1,duration:.86,lift:0,angle:0,forward:0,shake:0,quality:"normal"}
bestEl.textContent=best
mapBtn.addEventListener("pointerdown",e=>e.stopPropagation())
mapBtn.addEventListener("click",e=>e.stopPropagation())
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);w=innerWidth;h=innerHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+"px";canvas.style.height=h+"px";ctx.setTransform(dpr,0,0,dpr,0,0);layout();if(!running)draw()}
function layout(){scale=Math.min(1.08,Math.max(.75,w/430));panX=w*.5;panY=Math.min(h-210,h*.765)}
function rand(a,b){return a+Math.random()*(b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function resetGame(){score=0;lost=0;timeLeft=30;burn=0;stability=84;combo=0;cooldown=0;idleTime=0;food=[];spills=[];stars=[];steam=[];flip={active:false,t:1,duration:.86,lift:0,angle:0,forward:0,shake:0,quality:"normal"};let total=Math.max(95,Math.min(135,Math.floor(w/5.8)));for(let i=0;i<total;i++)food.push(makeFood());for(let i=0;i<15;i++)steam.push(makeSteam());tipEl.textContent="穩穩翻不太掉飯，太久沒翻會燒焦";updateUI()}
function makeFood(){let p=randomFoodLocal();return{type:foodType(),lx:p.x,ly:p.y,rot:rand(0,Math.PI*2),spin:rand(-2,2),size:rand(.86,1.15),bounce:rand(0,Math.PI*2),face:Math.random()<.08}}
function foodType(){let r=Math.random();if(r<.68)return"rice";if(r<.81)return"egg";if(r<.9)return"carrot";if(r<.97)return"pea";return"scallion"}
function randomFoodLocal(){let a=rand(0,Math.PI*2),r=Math.sqrt(Math.random());return{x:Math.cos(a)*r*68,y:Math.sin(a)*r*20-5+Math.abs(Math.cos(a)*r)*5}}
function makeSteam(){return{x:rand(-78,78),y:rand(-18,20),life:rand(0,1),speed:rand(.22,.48),bend:rand(-1,1)}}
function updateUI(){scoreEl.textContent=Math.floor(score);lostEl.textContent=lost;timeEl.textContent=timeLeft;bestEl.textContent=best;burnEl.textContent=Math.floor(burn);barEl.style.width=stability+"%"}
function startGame(){overlay.style.display="none";running=true;resetGame();clearInterval(timer);timer=setInterval(()=>{if(!running)return;timeLeft--;updateUI();if(timeLeft<=0)endGame()},1000);lastTime=performance.now();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}
function endGame(){
running=false
clearInterval(timer)
cancelAnimationFrame(raf)
let remain=food.length
let rawScore=score+remain*2-lost*14-burn*3
score=Math.max(0,Math.round(rawScore))
if(score>best){best=score;localStorage.setItem("cartoonFriedRiceBest7",String(best))}
updateUI()
let rank="再練一下，下一次會更穩"
if(burn>=70)rank="炒飯燒焦了，太久沒翻"
else if(score>=800)rank="做出完美炒飯"
else if(score>=650&&lost<=10)rank="高級炒飯師，翻鍋很穩"
else if(score>=500&&lost<=18)rank="不錯，已經有快炒店感覺"
let art=score>=800?'<div class="perfect-art"><div class="sparkle s1">✦</div><div class="sparkle s2">✦</div><div class="sparkle s3">✦</div><div class="rice-art"></div><div class="bowl"></div></div>':''
menu.innerHTML=`<h1>遊戲結束</h1><p>${rank}</p>${art}<div class="result"><div>分數<span>${Math.floor(score)}</span></div><div>掉飯<span>${lost}</span></div><div>燒焦<span>${Math.floor(burn)}%</span></div><div>最佳<span>${best}</span></div></div><button id="againBtn">再玩一次</button>`
overlay.style.display="grid"
document.getElementById("againBtn").addEventListener("click",startGame)
}
function showFlash(t){flash.textContent=t;flash.classList.remove("show");void flash.offsetWidth;flash.classList.add("show")}
function tapGame(cx,cy){
if(!running)return
let r=canvas.getBoundingClientRect(),x=cx-r.left,y=cy-r.top,l=worldToPan(x,y)
if(!(Math.abs(l.x)<160&&l.y>-90&&l.y<95))return
let now=performance.now(),gap=lastTap?now-lastTap:999
lastTap=now
idleTime=0
burn=clamp(burn-4,0,100)
let busy=flip.active&&flip.t<.72
let tooFast=busy||cooldown>.06||gap<190
let quality="normal"
if(tooFast){
quality="bad"
combo=0
stability=clamp(stability-8,0,100)
score+=4
tipEl.textContent="太急了，可能會噴出幾粒飯"
showFlash("慢一點！")
}else if(gap>=330&&gap<=860||flip.t>.86){
quality="perfect"
combo++
stability=clamp(stability+7,0,100)
score+=22+Math.min(combo*3,24)
tipEl.textContent="時機漂亮，整團飯會回鍋"
if(combo%3===0)showFlash("漂亮翻鍋！")
}else{
quality="good"
combo=Math.max(1,combo)
stability=clamp(stability+3,0,100)
score+=12
tipEl.textContent="不錯，穩穩翻比較安全"
}
startFlip(quality)
maybeSpill(quality)
addStars(quality)
cooldown=.42
updateUI()
}
function startFlip(q){flip.active=true;flip.t=0;flip.quality=q;flip.duration=q==="bad"?.74:q==="perfect"?.9:.86}
function maybeSpill(q){
let base=q==="bad"?.22:q==="perfect"?.004:.03
base+=(100-stability)/560
if(Math.random()>base)return
let amount=q==="bad"?Math.floor(rand(1,3)):1
for(let i=0;i<amount;i++)throwOne()
}
function throwOne(){
if(food.length<=18)return
let edge=food.map((p,i)=>({i,d:Math.abs(p.lx)})).sort((a,b)=>b.d-a.d).slice(0,Math.min(20,food.length))
let pick=edge[Math.floor(Math.random()*edge.length)].i
let p=food[pick],pos=foodWorld(p)
let dir=Math.sign(p.lx||rand(-1,1))
spills.push({type:p.type,x:pos.x,y:pos.y,vx:dir*rand(150,240)*scale,vy:-rand(250,410)*scale,rot:p.rot,spin:rand(-7,7),size:p.size,face:p.face,burn:burn})
food.splice(pick,1)
lost++
}
function addStars(q){
let n=q==="bad"?3:q==="perfect"?9:6
for(let i=0;i<n;i++)stars.push({x:panX+rand(-70,70)*scale,y:panY-rand(28,70)*scale,vx:rand(-85,85),vy:rand(-150,-60),life:rand(.36,.62),max:.62,r:rand(3,6),kind:Math.random()<.5?"star":"dot"})
}
function loop(t){if(!running)return;let dt=Math.min(.026,(t-lastTime)/1000);lastTime=t;update(dt);draw();raf=requestAnimationFrame(loop)}
function update(dt){
layout()
cooldown=Math.max(0,cooldown-dt)
idleTime+=dt
if(idleTime>2.4){
burn=clamp(burn+(idleTime>5?18:9)*dt,0,100)
stability=clamp(stability-dt*1.1,0,100)
tipEl.textContent=burn>65?"炒飯快燒焦了，快翻鍋！":"太久沒翻，飯開始變焦"
}else{
stability=clamp(stability-dt*.45,0,100)
}
if(flip.active){
flip.t+=dt/flip.duration
if(flip.t>=1){flip.t=1;flip.active=false;settleFood()}
}
let e=flip.t<1?ease(flip.t):1,wave=Math.sin(Math.PI*e)
flip.lift=wave*86*scale
flip.angle=-wave*.23+Math.sin(Math.PI*2*e)*.045
flip.forward=wave*8*scale
flip.shake=flip.quality==="bad"&&flip.active?Math.sin(e*Math.PI*8)*6*scale:0
for(let i=0;i<steam.length;i++){
steam[i].life+=dt*steam[i].speed
if(steam[i].life>1)steam[i]=makeSteam()
}
for(let i=spills.length-1;i>=0;i--){
let s=spills[i]
s.vy+=1120*dt
s.x+=s.vx*dt
s.y+=s.vy*dt
s.rot+=s.spin*dt
if(s.y>h-126){
s.y=h-126
s.vx=0
s.vy=0
s.spin=0
}
}
updateUI()
}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function settleFood(){for(let p of food){let r=randomFoodLocal();p.lx=r.x*.72+p.lx*.28;p.ly=r.y;p.rot+=rand(-.6,.6)}}
function panToWorld(lx,ly){let c=Math.cos(flip.angle),s=Math.sin(flip.angle);return{x:panX+flip.forward+flip.shake+(lx*c-ly*s)*scale,y:panY-flip.lift+(lx*s+ly*c)*scale}}
function worldToPan(x,y){let dx=(x-(panX+flip.forward+flip.shake))/scale,dy=(y-(panY-flip.lift))/scale,c=Math.cos(-flip.angle),s=Math.sin(-flip.angle);return{x:dx*c-dy*s,y:dx*s+dy*c}}
function foodWorld(p){let t=flip.t,e=t<1?ease(t):1,arc=-Math.sin(Math.PI*e)*34,spread=1+Math.sin(Math.PI*e)*.22,swirl=Math.sin(e*Math.PI*2+p.bounce)*6;return panToWorld(p.lx*spread+swirl,p.ly+arc/scale-Math.sin(Math.PI*e)*16)}
function draw(){ctx.clearRect(0,0,w,h);drawBackground();drawStove();drawFlame();drawSteam();drawPanBack();drawFood();drawPanFront();drawStars();drawSpills()}
function drawBackground(){
let tableY=h-118
for(let i=0;i<6;i++){
let x=(i*170+(performance.now()*.01))%(w+180)-90
drawCloud(x,90+i%2*54,1+i%3*.12)
}
let g=ctx.createLinearGradient(0,tableY,0,h)
g.addColorStop(0,"#a85d24")
g.addColorStop(1,"#65330f")
ctx.fillStyle=g
ctx.fillRect(0,tableY,w,h-tableY)
ctx.fillStyle="#4b2309"
ctx.fillRect(0,tableY,w,8)
ctx.globalAlpha=.18
ctx.fillStyle="#fff1bb"
for(let x=-40;x<w+80;x+=82){
ctx.beginPath()
ctx.ellipse(x,tableY+28,40,6,0,0,Math.PI*2)
ctx.fill()
}
ctx.globalAlpha=1
}
function drawCloud(x,y,s){
ctx.save()
ctx.translate(x,y)
ctx.scale(s,s)
ctx.fillStyle="rgba(255,255,255,.23)"
ctx.beginPath()
ctx.arc(-28,8,18,0,Math.PI*2)
ctx.arc(-8,-2,24,0,Math.PI*2)
ctx.arc(18,6,20,0,Math.PI*2)
ctx.arc(38,12,14,0,Math.PI*2)
ctx.fill()
ctx.restore()
}
function drawStove(){
let x=panX,y=panY+62*scale
ctx.save()
ctx.translate(x,y)
ctx.scale(scale,scale)
ctx.fillStyle="rgba(0,0,0,.22)"
roundRect(-122,28,244,20,12)
ctx.fill()
let b=ctx.createLinearGradient(0,-12,0,82)
b.addColorStop(0,"#626b78")
b.addColorStop(1,"#232832")
ctx.fillStyle=b
roundRect(-112,-6,224,84,25)
ctx.fill()
ctx.lineWidth=6
ctx.strokeStyle="#222"
roundRect(-112,-6,224,84,25)
ctx.stroke()
ctx.fillStyle="#15181f"
roundRect(-60,26,120,22,12)
ctx.fill()
ctx.fillStyle="#ffdf75"
ctx.beginPath()
ctx.arc(-86,18,8,0,Math.PI*2)
ctx.fill()
ctx.restore()
}
function drawFlame(){
let pulse=1+Math.sin(performance.now()*.016)*.08
ctx.save()
ctx.translate(panX,panY+42*scale)
ctx.scale(scale*pulse,scale*pulse)
for(let i=0;i<8;i++){
let fx=-48+i*14,h1=34+Math.sin(performance.now()*.008+i)*8
flame(fx,0,12,h1,"#f4511e")
flame(fx,6,8,h1*.65,"#ff9800")
flame(fx,11,5,h1*.38,"#fff176")
}
ctx.restore()
}
function flame(x,y,fw,fh,c){
ctx.beginPath()
ctx.moveTo(x,y-fh)
ctx.bezierCurveTo(x+fw,y-fh*.55,x+fw*.65,y-fh*.08,x,y)
ctx.bezierCurveTo(x-fw*.65,y-fh*.08,x-fw,y-fh*.55,x,y-fh)
ctx.fillStyle=c
ctx.fill()
}
function drawSteam(){
ctx.save()
ctx.lineCap="round"
ctx.lineWidth=4
for(let s of steam){
let p=panToWorld(s.x,-30-s.life*74+s.y)
ctx.globalAlpha=(1-s.life)*.28
ctx.strokeStyle=burn>65?"rgba(80,70,60,.55)":"#fff9df"
ctx.beginPath()
ctx.moveTo(p.x,p.y)
ctx.bezierCurveTo(p.x-12*s.bend,p.y-12,p.x+16*s.bend,p.y-28,p.x,p.y-46)
ctx.stroke()
}
ctx.globalAlpha=1
ctx.restore()
}
function drawPanBack(){
ctx.save()
ctx.translate(panX+flip.forward+flip.shake,panY-flip.lift)
ctx.rotate(flip.angle)
ctx.scale(scale,scale)
ctx.fillStyle="rgba(0,0,0,.2)"
ctx.beginPath()
ctx.ellipse(0,34,132,18,0,0,Math.PI*2)
ctx.fill()
ctx.save()
ctx.rotate(-.08)
let hdl=ctx.createLinearGradient(80,-10,222,10)
hdl.addColorStop(0,"#54606f")
hdl.addColorStop(1,"#171b22")
ctx.fillStyle=hdl
roundRect(78,-8,154,30,15)
ctx.fill()
ctx.lineWidth=6
ctx.strokeStyle="#111"
roundRect(78,-8,154,30,15)
ctx.stroke()
ctx.restore()
let outer=ctx.createRadialGradient(-22,-18,12,0,0,138)
outer.addColorStop(0,"#6f7c88")
outer.addColorStop(.52,"#303741")
outer.addColorStop(1,"#10131a")
ctx.fillStyle=outer
ctx.beginPath()
ctx.ellipse(0,0,130,62,0,0,Math.PI*2)
ctx.fill()
ctx.lineWidth=7
ctx.strokeStyle="#111"
ctx.stroke()
let inner=ctx.createRadialGradient(-25,-18,10,0,0,105)
inner.addColorStop(0,"#5d626a")
inner.addColorStop(.48,"#393d43")
inner.addColorStop(1,"#1c1f25")
ctx.fillStyle=inner
ctx.beginPath()
ctx.ellipse(0,-5,99,36,0,0,Math.PI*2)
ctx.fill()
ctx.restore()
}
function drawPanFront(){
ctx.save()
ctx.translate(panX+flip.forward+flip.shake,panY-flip.lift)
ctx.rotate(flip.angle)
ctx.scale(scale,scale)
ctx.beginPath()
ctx.ellipse(0,0,130,62,0,.1*Math.PI,.9*Math.PI)
ctx.lineWidth=8
ctx.strokeStyle="#0c0f15"
ctx.stroke()
ctx.restore()
}
function drawFood(){
let list=food.map(p=>({p:p,pos:foodWorld(p)})).sort((a,b)=>a.pos.y-b.pos.y)
for(let item of list){
drawIngredient(item.pos.x,item.pos.y,item.p.type,item.p.rot+flip.t*item.p.spin,item.p.size,item.p.face,burn)
}
}
function drawIngredient(x,y,type,rot,size,face,bn){
ctx.save()
ctx.translate(x,y)
ctx.rotate(rot)
let char=clamp((bn||0)/100,0,1)
let dark=char>.55
if(type==="rice"){
ctx.fillStyle=dark?mix("#fff4c8","#111111",char):mix("#fff4c8","#8a5a28",char*.45)
ctx.strokeStyle=dark?"#000":"#9b6b26"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.ellipse(0,0,7.4*size,4.6*size,0,0,Math.PI*2)
ctx.fill()
ctx.stroke()
if(face&&!dark){
ctx.fillStyle="#4a2b10"
ctx.beginPath()
ctx.arc(-2.4*size,-.8*size,.8*size,0,Math.PI*2)
ctx.arc(2.4*size,-.8*size,.8*size,0,Math.PI*2)
ctx.fill()
}
}else if(type==="egg"){
ctx.fillStyle=dark?mix("#ffe16a","#2b200d",char*.9):mix("#ffe16a","#b77c18",char*.45)
ctx.strokeStyle=dark?"#000":"#9b6b26"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.moveTo(-6*size,-4*size)
ctx.quadraticCurveTo(3*size,-7*size,8*size,-1*size)
ctx.quadraticCurveTo(6*size,7*size,-4*size,5*size)
ctx.quadraticCurveTo(-9*size,2*size,-6*size,-4*size)
ctx.fill()
ctx.stroke()
}else if(type==="carrot"){
ctx.fillStyle=dark?mix("#ff8b2d","#28150a",char*.9):mix("#ff8b2d","#9c5016",char*.45)
ctx.strokeStyle=dark?"#000":"#9b4d12"
ctx.lineWidth=1.8
roundRect(-5.5*size,-5*size,11*size,10*size,3*size)
ctx.fill()
ctx.stroke()
}else if(type==="pea"){
ctx.fillStyle=dark?mix("#79c94b","#15200d",char*.95):mix("#79c94b","#447728",char*.45)
ctx.strokeStyle=dark?"#000":"#3f7d24"
ctx.lineWidth=1.8
ctx.beginPath()
ctx.arc(0,0,5*size,0,Math.PI*2)
ctx.fill()
ctx.stroke()
}else{
ctx.strokeStyle=dark?mix("#3ca947","#111",char*.9):mix("#3ca947","#2f6b33",char*.4)
ctx.lineWidth=3.2*size
ctx.lineCap="round"
ctx.beginPath()
ctx.moveTo(-6*size,-2*size)
ctx.lineTo(6*size,2*size)
ctx.stroke()
}
ctx.restore()
}
function mix(a,b,t){
let A=parseInt(a.slice(1),16),B=parseInt(b.slice(1),16)
let ar=A>>16&255,ag=A>>8&255,ab=A&255,br=B>>16&255,bg=B>>8&255,bb=B&255
let r=Math.round(ar+(br-ar)*t),g=Math.round(ag+(bg-ag)*t),bl=Math.round(ab+(bb-ab)*t)
return`rgb(${r},${g},${bl})`
}
function drawStars(){
ctx.save()
for(let s of stars){
ctx.globalAlpha=Math.max(0,s.life/s.max)
if(s.kind==="star"){
ctx.fillStyle="#fff176"
ctx.strokeStyle="#a65a12"
ctx.lineWidth=1.5
star(s.x,s.y,s.r*1.8,s.r*.8)
ctx.fill()
ctx.stroke()
}else{
ctx.fillStyle="#fff4be"
ctx.beginPath()
ctx.arc(s.x,s.y,s.r,0,Math.PI*2)
ctx.fill()
}
}
ctx.globalAlpha=1
ctx.restore()
}
function star(x,y,r1,r2){
ctx.beginPath()
for(let i=0;i<10;i++){
let a=-Math.PI/2+i*Math.PI/5,r=i%2===0?r1:r2,px=x+Math.cos(a)*r,py=y+Math.sin(a)*r
if(i===0)ctx.moveTo(px,py)
else ctx.lineTo(px,py)
}
ctx.closePath()
}
function drawSpills(){
for(let s of spills){
drawIngredient(s.x,s.y,s.type,s.rot,s.size,s.face,s.burn||burn)
}
}
function roundRect(x,y,ww,hh,rr){
ctx.beginPath()
ctx.moveTo(x+rr,y)
ctx.arcTo(x+ww,y,x+ww,y+hh,rr)
ctx.arcTo(x+ww,y+hh,x,y+hh,rr)
ctx.arcTo(x,y+hh,x,y,rr)
ctx.arcTo(x,y,x+ww,y,rr)
ctx.closePath()
}
canvas.addEventListener("pointerdown",e=>{e.preventDefault();tapGame(e.clientX,e.clientY)})
window.addEventListener("resize",resize)
startBtn.addEventListener("click",startGame)
resize()
draw()
</script>
