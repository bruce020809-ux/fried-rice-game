<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>炒飯翻鍋小遊戲</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial,"Microsoft JhengHei",sans-serif;background:#ffd28c;user-select:none}
#app{position:relative;width:100vw;height:100dvh;overflow:hidden;background:radial-gradient(circle at 18% 13%,rgba(255,255,255,.55),transparent 22%),radial-gradient(circle at 82% 20%,rgba(255,255,255,.35),transparent 22%),linear-gradient(180deg,#ffe7ba 0%,#ffc272 53%,#ef933b 100%)}
canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none}
.hud{position:absolute;z-index:20;top:max(12px,env(safe-area-inset-top));left:12px;right:12px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px;pointer-events:none}
.card{background:#fffaf0;border:4px solid #6b3a16;border-radius:24px;color:#3a1d08;padding:10px 13px;box-shadow:0 8px 0 rgba(107,58,22,.25)}
.title{font-size:17px;font-weight:1000;line-height:1.14}
.desc{margin-top:5px;font-size:12px;line-height:1.45;font-weight:900}
.stats{min-width:142px;text-align:right}
.score{font-size:26px;line-height:1;font-weight:1000}
.row{display:flex;justify-content:space-between;gap:10px;margin-top:7px;font-size:12px;font-weight:1000}
.map-btn{position:absolute;z-index:24;top:max(16px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);display:inline-flex;align-items:center;justify-content:center;min-width:98px;height:44px;padding:0 15px;border:4px solid #6b3a16;border-radius:999px;background:#fffaf0;color:#3a1d08;text-decoration:none;font-size:15px;font-weight:1000;box-shadow:0 7px 0 rgba(107,58,22,.25)}
.map-btn:active{transform:translateX(-50%) translateY(3px);box-shadow:0 4px 0 rgba(107,58,22,.25)}
.meter{position:absolute;z-index:18;left:50%;bottom:max(25px,env(safe-area-inset-bottom));transform:translateX(-50%);width:min(620px,calc(100vw - 32px));pointer-events:none}
.bar-bg{height:28px;border:4px solid #6b3a16;border-radius:999px;background:#fff7de;overflow:hidden;box-shadow:0 6px 0 rgba(107,58,22,.22),inset 0 2px 8px rgba(0,0,0,.12)}
.bar{height:100%;width:78%;border-radius:999px;background:linear-gradient(90deg,#fff176 0%,#ffc234 45%,#ff8a2a 72%,#f4511e 100%);transition:width .08s linear}
.tip{margin-top:9px;text-align:center;font-size:14px;font-weight:1000;color:#3a1d08;text-shadow:0 2px 0 rgba(255,255,255,.65)}
.overlay{position:absolute;inset:0;z-index:40;display:grid;place-items:center;padding:18px;background:rgba(93,47,12,.13)}
.menu{width:min(470px,92vw);text-align:center;color:#3a1d08;background:#fffaf0;border:4px solid #6b3a16;border-radius:30px;box-shadow:0 12px 0 rgba(107,58,22,.28);padding:26px 22px 22px}
.menu h1{margin:0 0 10px;font-size:34px;line-height:1.08}
.menu p{margin:8px 0;font-size:15px;line-height:1.55;font-weight:900}
.result{margin:16px 0 4px;display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result div{background:#ffe6aa;border:2px solid rgba(107,58,22,.4);border-radius:18px;padding:10px 8px;font-weight:1000}
.result span{display:block;margin-top:5px;font-size:24px}
button{margin-top:15px;border:0;border-radius:20px;padding:13px 30px;color:white;font-size:20px;font-weight:1000;background:linear-gradient(180deg,#ff9f2d,#ef6d00);box-shadow:0 7px 0 #a94900;cursor:pointer}
button:active{transform:translateY(4px);box-shadow:0 3px 0 #a94900}
.flash{position:absolute;z-index:26;left:50%;top:41%;transform:translate(-50%,-50%);opacity:0;pointer-events:none;color:#b63600;font-size:34px;font-weight:1000;text-shadow:3px 3px 0 #fff,-3px 3px 0 #fff,3px -3px 0 #fff,-3px -3px 0 #fff,0 5px 0 rgba(107,58,22,.18)}
.flash.show{animation:flash .58s ease-out}
@keyframes flash{0%{opacity:0;transform:translate(-50%,-20%) scale(.82) rotate(-6deg)}35%{opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(3deg)}100%{opacity:0;transform:translate(-50%,-88%) scale(1) rotate(0)}}
@media(max-width:600px){.hud{top:max(10px,env(safe-area-inset-top));left:10px;right:10px;gap:8px}.card{padding:9px 10px;border-width:3px;border-radius:20px}.title{font-size:15px}.desc{font-size:11px}.stats{min-width:125px}.score{font-size:22px}.row{font-size:11px;gap:8px}.map-btn{top:max(76px,calc(env(safe-area-inset-top) + 68px));height:38px;font-size:13px;border-width:3px}.tip{font-size:13px}.menu h1{font-size:30px}.menu p{font-size:14px}.flash{font-size:28px}}
</style>
</head>
<body>
<div id="app">
<canvas id="game"></canvas>
<a class="map-btn" href="https://bruce020809-ux.github.io/fried-rice-game/" target="_blank" rel="noopener">打開地圖</a>
<div class="hud">
<div class="card"><div class="title">卡通炒飯翻鍋</div><div class="desc">點鍋子翻炒<br>穩穩點比較不會掉飯</div></div>
<div class="card stats"><div class="score"><span id="score">0</span> 分</div><div class="row"><span>掉飯</span><span id="lost">0</span></div><div class="row"><span>時間</span><span><span id="time">30</span>s</span></div><div class="row"><span>最佳</span><span id="best">0</span></div></div>
</div>
<div class="flash" id="flash">漂亮翻鍋！</div>
<div class="meter"><div class="bar-bg"><div class="bar" id="bar"></div></div><div class="tip" id="tip">飯會整團翻起來，亂點才會掉一些</div></div>
<div class="overlay" id="overlay"><div class="menu" id="menu"><h1>卡通炒飯翻鍋</h1><p>點鍋子讓炒飯整團翻起來，再自然落回鍋裡。</p><p>這版不會每次都掉飯，只有太急或節奏太亂才會噴一點出去。</p><p>30 秒後結算，掉飯越少分數越高。</p><button id="startBtn">開始遊戲</button></div></div>
</div>
<script>
const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")
const scoreEl=document.getElementById("score")
const lostEl=document.getElementById("lost")
const timeEl=document.getElementById("time")
const bestEl=document.getElementById("best")
const barEl=document.getElementById("bar")
const tipEl=document.getElementById("tip")
const overlay=document.getElementById("overlay")
const menu=document.getElementById("menu")
const startBtn=document.getElementById("startBtn")
const flash=document.getElementById("flash")
let w=0,h=0,dpr=1,scale=1,panX=0,panY=0
let running=false,score=0,lost=0,timeLeft=30,best=Number(localStorage.getItem("cartoonFriedRiceBest2")||0)
let food=[],spills=[],stars=[],steam=[]
let timer=null,raf=0,lastTime=0,lastTap=0,stability=78,combo=0,cooldown=0
let flip={active:false,t:1,duration:.82,lift:0,angle:0,forward:0,shake:0,quality:"normal"}
bestEl.textContent=best
function resize(){dpr=Math.min(window.devicePixelRatio||1,2);w=innerWidth;h=innerHeight;canvas.width=Math.floor(w*dpr);canvas.height=Math.floor(h*dpr);canvas.style.width=w+"px";canvas.style.height=h+"px";ctx.setTransform(dpr,0,0,dpr,0,0);layout();if(!running)draw()}
function layout(){scale=Math.min(1.08,Math.max(.75,w/430));panX=w*.5;panY=Math.min(h-210,h*.765)}
function rand(a,b){return a+Math.random()*(b-a)}
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}
function resetGame(){score=0;lost=0;timeLeft=30;stability=78;combo=0;cooldown=0;food=[];spills=[];stars=[];steam=[];flip={active:false,t:1,duration:.82,lift:0,angle:0,forward:0,shake:0,quality:"normal"};let total=Math.max(95,Math.min(135,Math.floor(w/5.8)));for(let i=0;i<total;i++)food.push(makeFood());for(let i=0;i<15;i++)steam.push(makeSteam());tipEl.textContent="飯會整團翻起來，亂點才會掉一些";updateUI()}
function makeFood(){let p=randomFoodLocal();return{type:foodType(),lx:p.x,ly:p.y,ox:p.x,oy:p.y,rot:rand(0,Math.PI*2),spin:rand(-2,2),size:rand(.86,1.15),bounce:rand(0,Math.PI*2),face:Math.random()<.08}}
function foodType(){let r=Math.random();if(r<.68)return"rice";if(r<.81)return"egg";if(r<.9)return"carrot";if(r<.97)return"pea";return"scallion"}
function randomFoodLocal(){let a=rand(0,Math.PI*2),r=Math.sqrt(Math.random());return{x:Math.cos(a)*r*68,y:Math.sin(a)*r*20-5+Math.abs(Math.cos(a)*r)*5}}
function makeSteam(){return{x:rand(-78,78),y:rand(-18,20),life:rand(0,1),speed:rand(.22,.48),bend:rand(-1,1)}}
function updateUI(){scoreEl.textContent=Math.floor(score);lostEl.textContent=lost;timeEl.textContent=timeLeft;bestEl.textContent=best;barEl.style.width=stability+"%"}
function startGame(){overlay.style.display="none";running=true;resetGame();clearInterval(timer);timer=setInterval(()=>{if(!running)return;timeLeft--;updateUI();if(timeLeft<=0)endGame()},1000);lastTime=performance.now();cancelAnimationFrame(raf);raf=requestAnimationFrame(loop)}
function endGame(){running=false;clearInterval(timer);cancelAnimationFrame(raf);let remain=food.length;score=Math.max(0,Math.round(score+remain*2-lost*12));if(score>best){best=score;localStorage.setItem("cartoonFriedRiceBest2",String(best))}updateUI();let rank="再練一下，下一次會更穩";if(score>=900&&lost<=5)rank="神級卡通快炒師，幾乎沒有掉飯";else if(score>=700&&lost<=10)rank="高級炒飯師，翻鍋很穩";else if(score>=500&&lost<=18)rank="不錯，已經有快炒店感覺";else if(lost>=28)rank="掉太多飯了，點慢一點會好很多";menu.innerHTML=`<h1>遊戲結束</h1><p>${rank}</p><div class="result"><div>分數<span>${Math.floor(score)}</span></div><div>掉飯<span>${lost}</span></div><div>鍋內剩飯<span>${remain}</span></div><div>最佳<span>${best}</span></div></div><button id="againBtn">再玩一次</button>`;overlay.style.display="grid";document.getElementById("againBtn").addEventListener("click",startGame)}
function showFlash(t){flash.textContent=t;flash.classList.remove("show");void flash.offsetWidth;flash.classList.add("show")}
function tapGame(cx,cy){if(!running)return;let r=canvas.getBoundingClientRect(),x=cx-r.left,y=cy-r.top,l=worldToPan(x,y);if(!(Math.abs(l.x)<160&&l.y>-90&&l.y<95))return;let now=performance.now(),gap=lastTap?now-lastTap:999;lastTap=now;let busy=flip.active&&flip.t<.72;let tooFast=busy||cooldown>.06||gap<210;let quality="normal";if(tooFast){quality="bad";combo=0;stability=clamp(stability-13,0,100);score+=4;tipEl.textContent="太急了，會噴出幾粒飯";showFlash("慢一點！")}else if(gap>=360&&gap<=850||flip.t>.88){quality="perfect";combo++;stability=clamp(stability+8,0,100);score+=22+Math.min(combo*3,30);tipEl.textContent="時機漂亮，整團飯會回鍋";if(combo%3===0)showFlash("漂亮翻鍋！")}else{quality="good";combo=Math.max(combo,1);stability=clamp(stability+3,0,100);score+=13;tipEl.textContent="不錯，節奏再穩一點更高分"}startFlip(quality);maybeSpill(quality);addStars(quality);cooldown=.18;updateUI()}
function startFlip(q){flip.active=true;flip.t=0;flip.quality=q;flip.duration=q==="bad"?.72:q==="perfect"?.88:.82}
function maybeSpill(q){let base=q==="bad"?.42:q==="perfect"?.02:.08;base+=(100-stability)/330;if(Math.random()>base)return;let amount=q==="bad"?Math.floor(rand(2,5)):1;for(let i=0;i<amount;i++)throwOne(q)}
function throwOne(q){if(food.length<=18)return;let edge=food.map((p,i)=>({i,d:Math.abs(p.lx)})).sort((a,b)=>b.d-a.d).slice(0,Math.min(24,food.length));let pick=edge[Math.floor(Math.random()*edge.length)].i;let p=food[pick],pos=foodWorld(p);let dir=Math.sign(p.lx||rand(-1,1));spills.push({type:p.type,x:pos.x,y:pos.y,vx:dir*rand(160,260)*scale,vy:-rand(260,430)*scale,rot:p.rot,spin:rand(-7,7),size:p.size,face:p.face});food.splice(pick,1);lost++}
function addStars(q){let n=q==="bad"?3:q==="perfect"?9:6;for(let i=0;i<n;i++)stars.push({x:panX+rand(-70,70)*scale,y:panY-rand(28,70)*scale,vx:rand(-85,85),vy:rand(-150,-60),life:rand(.36,.62),max:.62,r:rand(3,6),kind:Math.random()<.5?"star":"dot"})}
function loop(t){if(!running)return;let dt=Math.min(.026,(t-lastTime)/1000);lastTime=t;update(dt);draw();raf=requestAnimationFrame(loop)}
function update(dt){layout();cooldown=Math.max(0,cooldown-dt);stability=clamp(stability-dt*.55,0,100);if(flip.active){flip.t+=dt/flip.duration;if(flip.t>=1){flip.t=1;flip.active=false;settleFood()}}let e=flip.t<1?ease(flip.t):1,wave=Math.sin(Math.PI*e);flip.lift=wave*86*scale;flip.angle=-wave*.23+Math.sin(Math.PI*2*e)*.045;flip.forward=wave*14*scale;flip.shake=flip.quality==="bad"?Math.sin(e*Math.PI*8)*8*scale:0;for(let i=0;i<steam.length;i++){steam[i].life+=dt*steam[i].speed;if(steam[i].life>1)steam[i]=makeSteam()}for(let i=spills.length-1;i>=0;i--){let s=spills[i];s.vy+=980*dt;s.vx*=Math.pow(.992,dt*60);s.x+=s.vx*dt;s.y+=s.vy*dt;s.rot+=s.spin*dt;if(s.y>h-126){s.y=h-124+rand(-2,5);s.vx=0;s.vy=0;s.spin=0;s.land=true}if(s.x<-60||s.x>w+60||s.y>h+40)spills.splice(i,1)}for(let i=stars.length-1;i>=0;i--){let s=stars[i];s.life-=dt;s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=260*dt;if(s.life<=0)stars.splice(i,1)}if(food.length<15)endGame()}
function ease(t){return t<.5?2*t*t:1-Math.pow(-2*t+2,2)/2}
function settleFood(){for(let p of food){let r=randomFoodLocal();p.lx=r.x*.7+p.lx*.3;p.ly=r.y;p.ox=p.lx;p.oy=p.ly;p.rot+=rand(-.6,.6)}}
function panToWorld(lx,ly){let c=Math.cos(flip.angle),s=Math.sin(flip.angle);return{x:panX+flip.forward+flip.shake+(lx*c-ly*s)*scale,y:panY-flip.lift+(lx*s+ly*c)*scale}}
function worldToPan(x,y){let dx=(x-(panX+flip.forward+flip.shake))/scale,dy=(y-(panY-flip.lift))/scale,c=Math.cos(-flip.angle),s=Math.sin(-flip.angle);return{x:dx*c-dy*s,y:dx*s+dy*c}}
function foodWorld(p){let t=flip.t,e=t<1?ease(t):1,arc=-Math.sin(Math.PI*e)*34,spread=1+Math.sin(Math.PI*e)*.22,swirl=Math.sin(e*Math.PI*2+p.bounce)*6;let lx=p.lx*spread+swirl,ly=p.ly+arc/scale-Math.sin(Math.PI*e)*16;return panToWorld(lx,ly)}
function draw(){ctx.clearRect(0,0,w,h);drawBackground();drawStove();drawFlame();drawSteam();drawPanBack();drawFood();drawPanFront();drawStars();drawSpills()}
function drawBackground(){let tableY=h-118;for(let i=0;i<6;i++){let x=(i*170+(performance.now()*.01))%(w+180)-90;drawCloud(x,90+i%2*54,1+i%3*.12)}let g=ctx.createLinearGradient(0,tableY,0,h);g.addColorStop(0,"#a85d24");g.addColorStop(1,"#65330f");ctx.fillStyle=g;ctx.fillRect(0,tableY,w,h-tableY);ctx.fillStyle="#4b2309";ctx.fillRect(0,tableY,w,8);ctx.globalAlpha=.18;ctx.fillStyle="#fff1bb";for(let x=-40;x<w+80;x+=82){ctx.beginPath();ctx.ellipse(x,tableY+28,40,6,0,0,Math.PI*2);ctx.fill()}ctx.globalAlpha=1}
function drawCloud(x,y,s){ctx.save();ctx.translate(x,y);ctx.scale(s,s);ctx.fillStyle="rgba(255,255,255,.23)";ctx.beginPath();ctx.arc(-28,8,18,0,Math.PI*2);ctx.arc(-8,-2,24,0,Math.PI*2);ctx.arc(18,6,20,0,Math.PI*2);ctx.arc(38,12,14,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawStove(){let x=panX,y=panY+62*scale;ctx.save();ctx.translate(x,y);ctx.scale(scale,scale);ctx.fillStyle="rgba(0,0,0,.22)";roundRect(-122,28,244,20,12);ctx.fill();let b=ctx.createLinearGradient(0,-12,0,82);b.addColorStop(0,"#626b78");b.addColorStop(1,"#232832");ctx.fillStyle=b;roundRect(-112,-6,224,84,25);ctx.fill();ctx.lineWidth=6;ctx.strokeStyle="#222";roundRect(-112,-6,224,84,25);ctx.stroke();ctx.fillStyle="#15181f";roundRect(-60,26,120,22,12);ctx.fill();ctx.fillStyle="#ffdf75";ctx.beginPath();ctx.arc(-86,18,8,0,Math.PI*2);ctx.fill();ctx.restore()}
function drawFlame(){let pulse=1+Math.sin(performance.now()*.016)*.08;ctx.save();ctx.translate(panX,panY+42*scale);ctx.scale(scale*pulse,scale*pulse);for(let i=0;i<8;i++){let fx=-48+i*14,h1=34+Math.sin(performance.now()*.008+i)*8;flame(fx,0,12,h1,"#f4511e");flame(fx,6,8,h1*.65,"#ff9800");flame(fx,11,5,h1*.38,"#fff176")}ctx.restore()}
function flame(x,y,fw,fh,c){ctx.beginPath();ctx.moveTo(x,y-fh);ctx.bezierCurveTo(x+fw,y-fh*.55,x+fw*.65,y-fh*.08,x,y);ctx.bezierCurveTo(x-fw*.65,y-fh*.08,x-fw,y-fh*.55,x,y-fh);ctx.fillStyle=c;ctx.fill()}
function drawSteam(){ctx.save();ctx.lineCap="round";ctx.lineWidth=4;for(let s of steam){let p=panToWorld(s.x,-30-s.life*74+s.y);ctx.globalAlpha=(1-s.life)*.28;ctx.strokeStyle="#fff9df";ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.bezierCurveTo(p.x-12*s.bend,p.y-12,p.x+16*s.bend,p.y-28,p.x,p.y-46);ctx.stroke()}ctx.globalAlpha=1;ctx.restore()}
function drawPanBack(){ctx.save();ctx.translate(panX+flip.forward+flip.shake,panY-flip.lift);ctx.rotate(flip.angle);ctx.scale(scale,scale);ctx.fillStyle="rgba(0,0,0,.2)";ctx.beginPath();ctx.ellipse(0,34,132,18,0,0,Math.PI*2);ctx.fill();ctx.save();ctx.rotate(-.08);let hdl=ctx.createLinearGradient(80,-10,222,10);hdl.addColorStop(0,"#54606f");hdl.addColorStop(1,"#171b22");ctx.fillStyle=hdl;roundRect(78,-8,154,30,15);ctx.fill();ctx.lineWidth=6;ctx.strokeStyle="#111";roundRect(78,-8,154,30,15);ctx.stroke();ctx.fillStyle="#eef7ff";ctx.globalAlpha=.18;roundRect(104,-2,84,7,4);ctx.fill();ctx.globalAlpha=1;ctx.restore();let outer=ctx.createRadialGradient(-22,-18,12,0,0,138);outer.addColorStop(0,"#6f7c88");outer.addColorStop(.52,"#303741");outer.addColorStop(1,"#10131a");ctx.fillStyle=outer;ctx.beginPath();ctx.ellipse(0,0,130,62,0,0,Math.PI*2);ctx.fill();ctx.lineWidth=7;ctx.strokeStyle="#111";ctx.stroke();let inner=ctx.createRadialGradient(-25,-18,10,0,0,105);inner.addColorStop(0,"#5d626a");inner.addColorStop(.48,"#393d43");inner.addColorStop(1,"#1c1f25");ctx.fillStyle=inner;ctx.beginPath();ctx.ellipse(0,-5,99,36,0,0,Math.PI*2);ctx.fill();ctx.fillStyle="#fff";ctx.globalAlpha=.12;ctx.beginPath();ctx.ellipse(-36,-20,44,10,-.18,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.restore()}
function drawPanFront(){ctx.save();ctx.translate(panX+flip.forward+flip.shake,panY-flip.lift);ctx.rotate(flip.angle);ctx.scale(scale,scale);ctx.beginPath();ctx.ellipse(0,0,130,62,0,.1*Math.PI,.9*Math.PI);ctx.lineWidth=8;ctx.strokeStyle="#0c0f15";ctx.stroke();ctx.beginPath();ctx.ellipse(0,-6,100,37,0,.1*Math.PI,.9*Math.PI);ctx.lineWidth=5;ctx.strokeStyle="rgba(255,255,255,.14)";ctx.stroke();ctx.fillStyle="#0c0f15";ctx.beginPath();ctx.arc(-38,20,6,0,Math.PI*2);ctx.arc(38,20,6,0,Math.PI*2);ctx.fill();ctx.lineWidth=4;ctx.strokeStyle="#0c0f15";ctx.beginPath();ctx.arc(0,23,18,0,Math.PI);ctx.stroke();ctx.restore()}
function drawFood(){let list=food.map(p=>({p:p,pos:foodWorld(p)})).sort((a,b)=>a.pos.y-b.pos.y);for(let item of list)drawIngredient(item.pos.x,item.pos.y,item.p.type,item.p.rot+flip.t*item.p.spin,item.p.size,item.p.face)}
function drawIngredient(x,y,type,rot,size,face){ctx.save();ctx.translate(x,y);ctx.rotate(rot);if(type==="rice"){ctx.fillStyle="#fff4c8";ctx.strokeStyle="#9b6b26";ctx.lineWidth=1.8;ctx.beginPath();ctx.ellipse(0,0,7.4*size,4.6*size,0,0,Math.PI*2);ctx.fill();ctx.stroke();if(face){ctx.fillStyle="#4a2b10";ctx.beginPath();ctx.arc(-2.4*size,-.8*size,.8*size,0,Math.PI*2);ctx.arc(2.4*size,-.8*size,.8*size,0,Math.PI*2);ctx.fill();ctx.strokeStyle="#4a2b10";ctx.lineWidth=.9;ctx.beginPath();ctx.arc(0,.8*size,2*size,0,Math.PI);ctx.stroke()}}if(type==="egg"){ctx.fillStyle="#ffe16a";ctx.strokeStyle="#9b6b26";ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(-6*size,-4*size);ctx.quadraticCurveTo(3*size,-7*size,8*size,-1*size);ctx.quadraticCurveTo(6*size,7*size,-4*size,5*size);ctx.quadraticCurveTo(-9*size,2*size,-6*size,-4*size);ctx.fill();ctx.stroke()}if(type==="carrot"){ctx.fillStyle="#ff8b2d";ctx.strokeStyle="#9b4d12";ctx.lineWidth=1.8;roundRect(-5.5*size,-5*size,11*size,10*size,3*size);ctx.fill();ctx.stroke()}if(type==="pea"){ctx.fillStyle="#79c94b";ctx.strokeStyle="#3f7d24";ctx.lineWidth=1.8;ctx.beginPath();ctx.arc(0,0,5*size,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.fillStyle="rgba(255,255,255,.42)";ctx.beginPath();ctx.arc(-1.8*size,-1.8*size,1.3*size,0,Math.PI*2);ctx.fill()}if(type==="scallion"){ctx.strokeStyle="#3ca947";ctx.lineWidth=3.2*size;ctx.lineCap="round";ctx.beginPath();ctx.moveTo(-6*size,-2*size);ctx.lineTo(6*size,2*size);ctx.stroke();ctx.strokeStyle="#8ee37e";ctx.lineWidth=1.3*size;ctx.beginPath();ctx.moveTo(-4*size,-1.2*size);ctx.lineTo(4*size,1.2*size);ctx.stroke()}ctx.restore()}
function drawStars(){ctx.save();for(let s of stars){ctx.globalAlpha=Math.max(0,s.life/s.max);if(s.kind==="star"){ctx.fillStyle="#fff176";ctx.strokeStyle="#a65a12";ctx.lineWidth=1.5;star(s.x,s.y,s.r*1.8,s.r*.8);ctx.fill();ctx.stroke()}else{ctx.fillStyle="#fff4be";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()}}ctx.globalAlpha=1;ctx.restore()}
function star(x,y,r1,r2){ctx.beginPath();for(let i=0;i<10;i++){let a=-Math.PI/2+i*Math.PI/5,r=i%2===0?r1:r2,px=x+Math.cos(a)*r,py=y+Math.sin(a)*r;if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py)}ctx.closePath()}
function drawSpills(){for(let s of spills)drawIngredient(s.x,s.y,s.type,s.rot,s.size,s.face)}
function roundRect(x,y,ww,hh,rr){ctx.beginPath();ctx.moveTo(x+rr,y);ctx.arcTo(x+ww,y,x+ww,y+hh,rr);ctx.arcTo(x+ww,y+hh,x,y+hh,rr);ctx.arcTo(x,y+hh,x,y,rr);ctx.arcTo(x,y,x+ww,y,rr);ctx.closePath()}
canvas.addEventListener("pointerdown",e=>{e.preventDefault();tapGame(e.clientX,e.clientY)})
window.addEventListener("resize",resize)
startBtn.addEventListener("click",startGame)
resize()
draw()
</script>
